services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      HOSTNAME: 0.0.0.0
      POSTGRES_DB: ${POSTGRES_DB:-lechoppe}
      POSTGRES_USER: ${POSTGRES_USER:-lechoppe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lechoppe_user} -d ${POSTGRES_DB:-lechoppe}"]
      interval: 10s
      timeout: 5s
      retries: 5

  lechoppe:
    build:
      context: .
    image: lechoppe-postgresql:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-lechoppe_user}:${POSTGRES_PASSWORD:-change_this_password}@postgres:5432/${POSTGRES_DB:-lechoppe}
      UPLOAD_DIR: /app/.next/standalone/public/uploads/menu
    volumes:
      - uploads_data:/app/.next/standalone/public/uploads

volumes:
  postgres_data:
  uploads_data:
